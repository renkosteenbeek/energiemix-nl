services:
  app:
    build:
      context: .
    image: energiemix-nl:latest
    env_file:
      - .env.local
    container_name: energiemix-nl
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
