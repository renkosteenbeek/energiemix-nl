services:
  app:
    image: sjc.vultrcr.com/gentle/energiemix-nl:latest
    container_name: energiemix-nl
    restart: unless-stopped
    env_file: .env
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  proxy:
    external: true
